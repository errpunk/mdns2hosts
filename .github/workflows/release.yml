name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run tests
        run: go test -short ./...

      - name: Build Windows amd64 binary
        shell: pwsh
        run: |
          $date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $ldflags = "-s -w -X main.Version=${{ github.ref_name }} -X main.Commit=${{ github.sha }} -X main.BuildDate=$date"
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          go build -ldflags "$ldflags" -o mdns2hosts-windows-amd64.exe .

      - name: Generate checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 mdns2hosts-windows-amd64.exe).Hash.ToLower()
          "$hash  mdns2hosts-windows-amd64.exe" | Out-File -FilePath checksums.txt -Encoding utf8NoBOM

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release create "${{ github.ref_name }}" `
            --title "${{ github.ref_name }}" `
            --notes "Release ${{ github.ref_name }}" `
            mdns2hosts-windows-amd64.exe `
            checksums.txt
