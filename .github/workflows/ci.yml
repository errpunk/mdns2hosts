name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Run tests
        run: go test -short ./... -coverprofile coverage.out -covermode atomic
      - name: Report coverage
        run: go tool cover -func coverage.out

  coverage:
    needs: test
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Run tests with coverage
        run: go test ./... -coverprofile coverage.out -covermode atomic
      - name: Generate coverage badge JSON
        shell: pwsh
        run: |
          $total = (go tool cover -func coverage.out | Select-Object -Last 1) -replace '.*\s+(\d+\.\d+)%.*','$1'
          $color = if ([double]$total -ge 90) { 'brightgreen' } elseif ([double]$total -ge 75) { 'yellow' } else { 'red' }
          @{ schemaVersion = 1; label = 'coverage'; message = "$total%"; color = $color } | ConvertTo-Json -Compress | Out-File -FilePath coverage-badge.json -Encoding utf8NoBOM
      - name: Commit coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coverage-badge.json
          git diff --staged --quiet || git commit -m "Update coverage badge [skip ci]"
          git push

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: mdns2hosts-windows
            output: mdns2hosts.exe
          - os: ubuntu-latest
            artifact: mdns2hosts-linux
            output: mdns2hosts
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build
        run: go build -ldflags "-X main.Version=${{ github.ref_name }}-${{ github.sha }}" -o ${{ matrix.output }} .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.output }}
